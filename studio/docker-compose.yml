# Bobby Studio — three services: storage (Qdrant vector DB), backend (Python engine + API), frontend (Next.js + tRPC).
# `docker compose up` from studio/ brings the whole stack live at http://localhost:3000.
#
# The engine's LLM + embedding endpoints are supplied via env (point them at your served model / nomic-embed).
# Defaults use host.docker.internal so a model running on the host (e.g. the DGX tunnel) is reachable.
services:
  storage:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ..                     # the generative_agentic package dir
      dockerfile: studio/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      QDRANT_URL: http://storage:6333
      GA_LLM_URL: ${GA_LLM_URL:-http://host.docker.internal:8002/v1/chat/completions}
      GA_LLM_MODEL: ${GA_LLM_MODEL:-claude-opus-4-8}
      GA_EMBED_URL: ${GA_EMBED_URL:-http://host.docker.internal:11435/api/embed}
      GA_EXTRA_BODY: ${GA_EXTRA_BODY:-{"chat_template_kwargs":{"enable_thinking":false}}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
