name: Bug report
description: Report a defect in Bobby
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security** issues, do **not** file here — see
        [SECURITY.md](https://github.com/Moun1r1/Bobby-Self-Organizing-Agent-Squad/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What went wrong, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal, deterministic repro if possible (which `wiki/proofs/*` or command).
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, model/embeddings endpoint, torch present?, commit SHA.
      placeholder: "macOS 15 · Python 3.12 · Qwen3.6-35B via sglang · torch yes · abc1234"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant server-side logs or tracebacks (redact any secrets).
      render: shell
